<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSIXGOD | EN MANTENIMIENTO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            background: #0b0b0f;
            color: #fff;
            text-align: center;
            padding-top: 80px;
        }
        h1 { font-size: 2.4rem; margin-bottom: 25px; color: #00eeff; }
        .aviso {
            color: #ff3333;
            font-weight: bold;
            font-size: 1.4rem;
            margin-bottom: 15px;
        }
        .causa {
            font-size: 1rem;
            color: #cccccc;
            margin-bottom: 30px;
        }
        .contador {
            font-size: 2rem;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 40px;
        }
        .whatsapp {
            display: inline-block;
            background: #25d366;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <h1>SENSIXGOD</h1>

    <div class="aviso">Página Web en Mantenimiento ❌</div>
    <div class="causa">Causa: Analizando errores</div>

    <div class="contador" id="tiempo">10 : 00</div>

    <a href="https://whatsapp.com/channel/0029Vb6vN7xEquiQMAAQuK0M" target="_blank" class="whatsapp">📢 CANAL OFICIAL WHATSAPP</a>

<script>
// ⏱️ 10 minutos = 600 segundos, cuenta hacia atrás y se detiene en 0
let totalSegundos = 10 * 60;
const elemento = document.getElementById("tiempo");

function actualizar() {
    let min = Math.floor(totalSegundos / 60);
    let seg = totalSegundos % 60;
    elemento.textContent = 
        String(min).padStart(2,'0') + " : " + String(seg).padStart(2,'0');

    if (totalSegundos <= 0) {
        clearInterval(cuenta); // se detiene exactamente en 00:00
        return;
    }
    totalSegundos--;
}

const cuenta = setInterval(actualizar, 1000);
actualizar(); // mostrar desde el primer segundo
</script>

</body>
</html>

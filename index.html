<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SensiXGod Página V1</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            text-align: center;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            max-width: 600px;
        }

        h1 {
            color: #00ff88;
        }

        .mantenimiento {
            color: #ff4d4d;
            font-size: 22px;
            font-weight: bold;
        }

        .info {
            margin-top: 20px;
            color: #cccccc;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Bienvenido a SensiXGod Página V1!</h1>

        <p class="mantenimiento">
            Por el momento está en mantenimiento ❌
        </p>

        <p class="info">
            En cuanto la terminemos, los desarrolladores automáticamente
            se te notificarán por WhatsApp.
        </p>
    </div>

</body>
</html>

<script>
// =====================
// FONDOS
// =====================
const bg = document.getElementById('bg');
const themeBtn = document.getElementById('themeBtn');

let currentTheme = 0;

function changeTheme() {
    currentTheme = (currentTheme + 1) % 3;

    if (currentTheme === 0) {
        bg.style.backgroundImage =
            "url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564')";
        bg.style.backgroundColor = "transparent";
        bg.style.opacity = "0.25";
        document.body.style.color = "#00ffcc";

    } else if (currentTheme === 1) {
        bg.style.backgroundImage = "none";
        bg.style.backgroundColor = "#000";
        bg.style.opacity = "1";
        document.body.style.color = "#00ffcc";

    } else {
        bg.style.backgroundImage = "none";
        bg.style.backgroundColor = "#fff";
        bg.style.opacity = "1";
        document.body.style.color = "#000";
    }
}

themeBtn.addEventListener("click", changeTheme);

// Fondo inicial
currentTheme = -1;
changeTheme();


// =====================
// PERSONAS ONLINE
// =====================
let online = Math.floor(Math.random() * 500) + 100;

document.getElementById("count").textContent = online;

setInterval(() => {
    const cambio = Math.floor(Math.random() * 15) - 7;

    online += cambio;

    if (online < 100) online = 100;
    if (online > 999) online = 999;

    document.getElementById("count").textContent = online;
}, 5000);


// =====================
// PARTICULAS
// =====================
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

const particles = [];

class Particle {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 0.4 - 0.2;
        this.speedY = Math.random() * 0.4 - 0.2;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) {
            this.reset();
        }
    }

    draw() {
        ctx.fillStyle = "#00ffff";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#00ffff";
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

for (let i = 0; i < 150; i++) {
    particles.push(new Particle());
}

function animate() {
    ctx.clearRect(0, 0, w, h);

    particles.forEach((particle) => {
        particle.update();
        particle.draw();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
});


// =====================
// BOTONES
// =====================
const verInfoBtn = document.getElementById("verInfoBtn");
const infoText = document.getElementById("infoText");

verInfoBtn.addEventListener("click", () => {
    verInfoBtn.style.display = "none";
    infoText.classList.add("visible");
});


// =====================
// CUENTA REGRESIVA
// =====================
const razonBtn = document.getElementById("razonBtn");
const razonText = document.getElementById("razonText");

let timeLeft = 20;
let timer;

razonBtn.addEventListener("click", () => {
    infoText.style.display = "none";
    razonText.classList.add("visible");

    document.getElementById("countdown").textContent = timeLeft;

    timer = setInterval(() => {
        timeLeft--;

        document.getElementById("seconds").textContent = timeLeft;
        document.getElementById("countdown").textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);

            document.body.innerHTML = `
                <h1 style="
                    margin-top:40vh;
                    color:#ff0000;
                    font-size:3rem;
                    text-align:center;
                ">
                    ¡GRACIAS POR VISITAR!
                </h1>
            `;
        }
    }, 1000);
});


// =====================
// PWA
// =====================
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js")
            .catch(err => console.log(err));
    });
}
    </script>
